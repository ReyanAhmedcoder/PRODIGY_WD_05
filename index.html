<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyRead — Weather</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-top: #0a1628;
    --sky-mid: #0d2347;
    --sky-glow: #1a3a6e;
    --cloud: rgba(255,255,255,0.06);
    --card-bg: rgba(255,255,255,0.05);
    --card-border: rgba(255,255,255,0.1);
    --text: #e8f0fe;
    --muted: rgba(200,215,255,0.55);
    --accent: #60a5fa;
    --accent2: #a78bfa;
    --warm: #fbbf24;
    --danger: #f87171;
    --success: #34d399;
    --font-display: 'Instrument Serif', serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --r: 12px;
  }

  /* WEATHER THEMES */
  body.theme-clear { --sky-top: #0a1a2e; --sky-mid: #0e2d52; --sky-glow: #1e4d8c; }
  body.theme-clouds { --sky-top: #1a1a2e; --sky-mid: #2a2a42; --sky-glow: #3a3a5c; }
  body.theme-rain { --sky-top: #0d1b2a; --sky-mid: #1a2f45; --sky-glow: #1f3d5c; }
  body.theme-storm { --sky-top: #0a0f1a; --sky-mid: #111929; --sky-glow: #1a243d; }
  body.theme-snow { --sky-top: #1a2030; --sky-mid: #252f45; --sky-glow: #303d5c; }
  body.theme-mist { --sky-top: #1f2835; --sky-mid: #29364a; --sky-glow: #354460; }
  body.theme-sunny { --sky-top: #0c1e3b; --sky-mid: #163366; --sky-glow: #1e4d99; }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    min-height: 100vh;
    font-family: var(--font-body);
    color: var(--text);
    background: var(--sky-top);
    overflow-x: hidden;
    transition: background 1.5s ease;
    cursor: none;
  }

  /* CURSOR */
  #cur { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; position: fixed; top:0; left:0; pointer-events:none; z-index:9999; mix-blend-mode:difference; transition: transform 0.1s; }
  #cur-ring { width: 36px; height: 36px; border: 1.5px solid rgba(96,165,250,0.5); border-radius:50%; position:fixed; top:0; left:0; pointer-events:none; z-index:9998; transition: transform 0.35s cubic-bezier(.23,1,.32,1); }

  /* SKY CANVAS */
  #sky-canvas { position: fixed; inset:0; pointer-events:none; z-index:0; }

  /* LAYOUT */
  .app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 40px;
    border-bottom: 1px solid var(--card-border);
    backdrop-filter: blur(20px);
    background: rgba(10,22,40,0.3);
  }
  .logo {
    font-family: var(--font-display);
    font-size: 1.4rem;
    font-style: italic;
    letter-spacing: -0.01em;
    color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse-dot 2s infinite; }
  @keyframes pulse-dot { 0%,100%{box-shadow:0 0 0 0 rgba(96,165,250,0.4)} 50%{box-shadow:0 0 0 8px rgba(96,165,250,0)} }

  /* SEARCH BAR */
  .search-wrap {
    flex: 1; max-width: 480px; margin: 0 40px;
    position: relative;
  }
  .search-input {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--card-border);
    border-radius: 999px;
    padding: 11px 48px 11px 20px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
    backdrop-filter: blur(10px);
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(96,165,250,0.12);
    background: rgba(255,255,255,0.1);
  }
  .search-btn {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: var(--accent); border: none; border-radius: 50%;
    width: 32px; height: 32px; cursor: none;
    display: flex; align-items: center; justify-content: center;
    color: #0a1628; transition: background 0.2s, transform 0.2s;
  }
  .search-btn:hover { background: #93c5fd; transform: translateY(-50%) scale(1.05); }
  .geo-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--muted);
    font-family: var(--font-body); font-size: 0.82rem;
    cursor: none;
    display: flex; align-items: center; gap: 6px;
    transition: color 0.3s, border-color 0.3s, background 0.3s;
    white-space: nowrap;
  }
  .geo-btn:hover { color: var(--text); border-color: var(--accent); background: rgba(96,165,250,0.08); }

  /* MAIN */
  main { flex: 1; padding: 36px 40px; display: flex; flex-direction: column; gap: 24px; }

  /* HERO CARD */
  .hero-card {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    overflow: hidden;
    backdrop-filter: blur(20px);
    min-height: 280px;
    position: relative;
  }
  .hero-left {
    padding: 40px;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative;
  }
  .hero-location {
    font-family: var(--font-mono); font-size: 0.72rem;
    color: var(--accent); letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .hero-temp-block { }
  .hero-temp {
    font-family: var(--font-display);
    font-size: clamp(5rem, 10vw, 7.5rem);
    font-weight: 400;
    line-height: 0.9;
    letter-spacing: -0.04em;
    color: var(--text);
    display: flex; align-items: flex-start;
  }
  .hero-temp sup {
    font-family: var(--font-body); font-size: 1.8rem;
    margin-top: 10px; margin-left: 4px;
    color: var(--muted); font-weight: 300;
  }
  .hero-feels { font-size: 0.82rem; color: var(--muted); margin-top: 8px; }
  .hero-bottom { display: flex; align-items: center; gap: 12px; }
  .hero-condition {
    font-family: var(--font-display);
    font-size: 1.3rem;
    font-style: italic;
    color: var(--text);
  }

  .hero-right {
    padding: 40px;
    display: flex; flex-direction: column; justify-content: space-between;
    border-left: 1px solid var(--card-border);
    position: relative;
  }
  .weather-icon-wrap {
    display: flex; align-items: center; justify-content: center;
    flex: 1;
  }
  .weather-icon-big {
    font-size: clamp(5rem, 8vw, 7rem);
    animation: iconFloat 4s ease-in-out infinite;
    filter: drop-shadow(0 0 40px rgba(96,165,250,0.3));
    line-height: 1;
  }
  @keyframes iconFloat {
    0%,100%{transform:translateY(0) scale(1)}
    50%{transform:translateY(-12px) scale(1.04)}
  }
  .hero-stats-mini {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .mini-stat {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--card-border);
    border-radius: 10px; padding: 12px 14px;
  }
  .mini-stat-label { font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.06em; }
  .mini-stat-val { font-family: var(--font-mono); font-size: 1rem; font-weight: 500; color: var(--text); }

  /* UNIT TOGGLE */
  .unit-toggle {
    display: flex; gap: 4px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--card-border);
    border-radius: 8px; padding: 4px;
  }
  .unit-btn {
    background: transparent; border: none;
    padding: 6px 14px; border-radius: 6px;
    color: var(--muted); font-family: var(--font-mono);
    font-size: 0.8rem; cursor: none; transition: all 0.2s;
  }
  .unit-btn.active { background: var(--accent); color: #0a1628; font-weight: 600; }

  /* INFO ROW */
  .info-row {
    display: grid; grid-template-columns: repeat(4,1fr); gap: 16px;
  }
  .info-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--r);
    padding: 22px 20px;
    backdrop-filter: blur(16px);
    transition: transform 0.25s, border-color 0.25s, background 0.25s;
    position: relative; overflow: hidden;
  }
  .info-card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.3s;
  }
  .info-card:hover { transform: translateY(-3px); border-color: rgba(96,165,250,0.3); background: rgba(255,255,255,0.08); }
  .info-card:hover::after { transform: scaleX(1); }
  .info-icon { font-size: 1.4rem; margin-bottom: 10px; display: block; }
  .info-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .info-val { font-family: var(--font-mono); font-size: 1.3rem; font-weight: 500; color: var(--text); }
  .info-sub { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

  /* GAUGE */
  .gauge-wrap { margin-top: 8px; }
  .gauge-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .gauge-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 1.2s cubic-bezier(.23,1,.32,1); width: 0; }

  /* HOURLY */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-label {
    font-family: var(--font-mono); font-size: 0.72rem;
    color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
  }
  .hourly-scroll {
    display: flex; gap: 12px;
    overflow-x: auto; padding-bottom: 4px;
    scrollbar-width: none;
  }
  .hourly-scroll::-webkit-scrollbar { display: none; }
  .hour-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 16px 14px;
    min-width: 76px;
    text-align: center;
    backdrop-filter: blur(16px);
    transition: transform 0.2s, border-color 0.2s, background 0.2s;
    flex-shrink: 0;
    cursor: none;
  }
  .hour-card:hover { transform: translateY(-4px); border-color: rgba(96,165,250,0.4); background: rgba(255,255,255,0.09); }
  .hour-card.now { border-color: var(--accent); background: rgba(96,165,250,0.12); }
  .hour-time { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); margin-bottom: 8px; }
  .hour-card.now .hour-time { color: var(--accent); }
  .hour-icon { font-size: 1.5rem; margin-bottom: 8px; display: block; }
  .hour-temp { font-family: var(--font-mono); font-size: 0.9rem; font-weight: 500; color: var(--text); }
  .hour-rain { font-size: 0.65rem; color: var(--accent); margin-top: 3px; }

  /* FORECAST */
  .forecast-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px;
  }
  .day-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--r);
    padding: 18px 12px;
    text-align: center;
    backdrop-filter: blur(16px);
    transition: transform 0.2s, border-color 0.2s;
    cursor: none;
  }
  .day-card:hover { transform: translateY(-3px); border-color: rgba(96,165,250,0.35); }
  .day-card.today { border-color: var(--accent); background: rgba(96,165,250,0.08); }
  .day-name { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
  .day-card.today .day-name { color: var(--accent); }
  .day-icon { font-size: 1.8rem; margin-bottom: 10px; display: block; }
  .day-temps { display: flex; justify-content: center; gap: 6px; font-family: var(--font-mono); font-size: 0.8rem; }
  .day-hi { color: var(--text); font-weight: 500; }
  .day-lo { color: var(--muted); }
  .day-rain { font-size: 0.65rem; color: var(--accent); margin-top: 6px; }

  /* SUN ARC */
  .sun-section { }
  .sun-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--r);
    padding: 28px 32px;
    backdrop-filter: blur(16px);
  }
  .sun-arc-wrap { position: relative; width: 100%; }
  .sun-arc-svg { width: 100%; overflow: visible; }
  .sun-times { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 0.78rem; margin-top: 10px; }
  .sun-time-label { color: var(--muted); font-size: 0.65rem; margin-bottom: 2px; }
  .sun-time-val { color: var(--text); }

  /* AIR QUALITY */
  .aqi-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--r);
    padding: 24px;
    backdrop-filter: blur(16px);
  }
  .aqi-score-wrap { display: flex; align-items: center; gap: 20px; margin-bottom: 16px; }
  .aqi-ring { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
  .aqi-ring svg { width: 80px; height: 80px; transform: rotate(-90deg); }
  .aqi-ring-num {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 1.3rem; font-weight: 500;
  }
  .aqi-label { font-family: var(--font-display); font-size: 1.1rem; font-style: italic; }
  .aqi-desc { font-size: 0.8rem; color: var(--muted); margin-top: 4px; line-height: 1.5; }
  .aqi-bars { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .aqi-bar-item { }
  .aqi-bar-label { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--muted); margin-bottom: 5px; }
  .aqi-bar-bg { height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
  .aqi-bar-fill { height: 100%; border-radius: 2px; transition: width 1.4s cubic-bezier(.23,1,.32,1); width: 0; }

  /* MAP PLACEHOLDER */
  .map-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--r);
    overflow: hidden;
    height: 200px;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(16px);
    position: relative;
  }
  .map-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(96,165,250,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(96,165,250,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .map-pin {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-size: 2rem;
    animation: mapPulse 2s ease-in-out infinite;
  }
  @keyframes mapPulse { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .map-pin::after {
    content: '';
    width: 40px; height: 6px;
    background: radial-gradient(ellipse, rgba(96,165,250,0.4), transparent);
    border-radius: 50%;
    animation: mapShadow 2s ease-in-out infinite;
  }
  @keyframes mapShadow { 0%,100%{width:40px;opacity:0.4} 50%{width:30px;opacity:0.2} }
  .map-coords { font-family: var(--font-mono); font-size: 0.72rem; color: var(--accent); position: absolute; bottom: 14px; right: 16px; }

  /* BOTTOM GRID */
  .bottom-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;
  }

  /* STATE: LOADING */
  .loading-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 40px; gap: 20px; text-align: center;
    color: var(--muted);
  }
  .spinner {
    width: 48px; height: 48px;
    border: 2px solid rgba(96,165,250,0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-label { font-family: var(--font-mono); font-size: 0.78rem; letter-spacing: 0.08em; }

  /* STATE: ERROR */
  .error-state {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    text-align: center; padding: 60px 40px;
    color: var(--muted);
  }
  .error-icon { font-size: 3rem; }
  .error-title { font-family: var(--font-display); font-size: 1.4rem; font-style: italic; color: var(--text); }
  .error-desc { font-size: 0.88rem; line-height: 1.6; max-width: 360px; }
  .retry-btn {
    background: rgba(96,165,250,0.15); border: 1px solid var(--accent);
    color: var(--accent); padding: 10px 24px; border-radius: 8px;
    font-family: var(--font-body); font-size: 0.85rem; cursor: none;
    transition: background 0.2s;
  }
  .retry-btn:hover { background: rgba(96,165,250,0.25); }

  /* STATE: WELCOME */
  .welcome-state {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; text-align: center; padding: 40px;
  }
  .welcome-title {
    font-family: var(--font-display); font-size: clamp(2.5rem, 5vw, 4rem);
    font-style: italic; line-height: 1.1; letter-spacing: -0.02em; color: var(--text);
  }
  .welcome-sub { color: var(--muted); font-size: 1rem; max-width: 360px; line-height: 1.7; }
  .welcome-cta {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 8px;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: rgba(15,25,50,0.95); border: 1px solid var(--card-border);
    backdrop-filter: blur(20px); border-radius: 10px;
    padding: 12px 22px; font-size: 0.85rem; color: var(--text);
    z-index: 8000; transition: transform 0.4s cubic-bezier(.23,1,.32,1);
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* RAIN ANIMATION */
  .rain-container { position: fixed; inset: 0; pointer-events: none; z-index: 2; overflow: hidden; opacity: 0; transition: opacity 1s; }
  .rain-container.active { opacity: 1; }
  .raindrop {
    position: absolute; top: -10px;
    width: 1px; background: linear-gradient(to bottom, transparent, rgba(140,180,255,0.5));
    animation: rainFall linear infinite;
    border-radius: 0 0 2px 2px;
  }
  @keyframes rainFall { to { transform: translateY(110vh); } }

  /* SNOW ANIMATION */
  .snow-container { position: fixed; inset: 0; pointer-events: none; z-index: 2; overflow: hidden; opacity: 0; transition: opacity 1s; }
  .snow-container.active { opacity: 1; }
  .snowflake {
    position: absolute; top: -10px;
    color: rgba(200,220,255,0.7);
    font-size: 0.8rem;
    animation: snowFall linear infinite;
  }
  @keyframes snowFall {
    0% { transform: translateY(-10px) translateX(0) rotate(0deg); }
    100% { transform: translateY(100vh) translateX(40px) rotate(360deg); }
  }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    header { flex-wrap: wrap; gap: 12px; padding: 16px 20px; }
    .search-wrap { max-width: 100%; margin: 0; order: 3; width: 100%; }
    main { padding: 24px 20px; }
    .hero-card { grid-template-columns: 1fr; }
    .hero-right { border-left: none; border-top: 1px solid var(--card-border); }
    .info-row { grid-template-columns: 1fr 1fr; }
    .forecast-grid { grid-template-columns: repeat(4,1fr); }
    .bottom-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 560px) {
    .forecast-grid { grid-template-columns: repeat(3,1fr); }
    .info-row { grid-template-columns: 1fr 1fr; }
    .hero-temp { font-size: 5rem; }
  }
</style>
</head>
<body class="theme-clear">

<!-- CURSOR -->
<div id="cur"></div>
<div id="cur-ring"></div>

<!-- CANVAS -->
<canvas id="sky-canvas"></canvas>

<!-- WEATHER EFFECTS -->
<div class="rain-container" id="rain-container"></div>
<div class="snow-container" id="snow-container"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<div class="app">
  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      SkyRead
    </div>

    <div class="search-wrap">
      <input type="text" class="search-input" id="search-input" placeholder="Search city — try 'Tokyo' or 'London'…" autocomplete="off">
      <button class="search-btn" id="search-btn" title="Search">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>

    <div style="display:flex;align-items:center;gap:10px">
      <button class="geo-btn" id="geo-btn">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
        My Location
      </button>
      <div class="unit-toggle">
        <button class="unit-btn active" id="btn-c" data-unit="metric">°C</button>
        <button class="unit-btn" id="btn-f" data-unit="imperial">°F</button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main id="main">
    <div class="welcome-state" id="welcome-state">
      <div class="welcome-title">What's the sky<br>doing today?</div>
      <p class="welcome-sub">Search any city worldwide or let us find your location automatically.</p>
      <div class="welcome-cta">
        <button class="geo-btn" style="font-size:0.9rem;padding:12px 24px;" onclick="getLocation()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
          Use My Location
        </button>
        <button class="geo-btn" style="font-size:0.9rem;padding:12px 24px;" onclick="loadDemo('Delhi')">Try Delhi</button>
        <button class="geo-btn" style="font-size:0.9rem;padding:12px 24px;" onclick="loadDemo('New York')">Try New York</button>
      </div>
    </div>
  </main>
</div>

<script>
// ── CONFIG ──
// Replace with your OpenWeatherMap API key from openweathermap.org (free tier)
const API_KEY = 'YOUR_API_KEY_HERE';
const BASE = 'https://api.openweathermap.org/data/2.5';

let unit = 'metric';
let currentCity = '';
let weatherData = null;

// ── CURSOR ──
const cur = document.getElementById('cur'), ring = document.getElementById('cur-ring');
let mx=0, my=0, rx=0, ry=0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cur.style.transform = `translate(${mx-5}px,${my-5}px)`;
});
(function animRing() {
  rx += (mx-rx)*0.1; ry += (my-ry)*0.1;
  ring.style.transform = `translate(${rx-18}px,${ry-18}px)`;
  requestAnimationFrame(animRing);
})();
document.querySelectorAll('button,input,.hour-card,.day-card,.info-card').forEach(el => {
  el.addEventListener('mouseenter', () => { ring.style.width='52px'; ring.style.height='52px'; });
  el.addEventListener('mouseleave', () => { ring.style.width='36px'; ring.style.height='36px'; });
});

// ── SKY CANVAS (stars + clouds) ──
const canvas = document.getElementById('sky-canvas');
const ctx = canvas.getContext('2d');
let stars = [], clouds = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height * 0.7,
      r: Math.random() * 1.2 + 0.3,
      o: Math.random() * 0.7 + 0.2,
      twinkle: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.005
    });
  }
}

function initClouds() {
  clouds = [];
  for (let i = 0; i < 5; i++) {
    clouds.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height * 0.4 + 40,
      w: Math.random() * 200 + 100,
      h: Math.random() * 40 + 20,
      speed: Math.random() * 0.3 + 0.1,
      o: Math.random() * 0.07 + 0.02
    });
  }
}

initStars(); initClouds();

let showStars = true, showClouds = false;

function drawSky() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Gradient background
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, getComputedStyle(document.body).getPropertyValue('--sky-top').trim() || '#0a1628');
  grad.addColorStop(0.5, getComputedStyle(document.body).getPropertyValue('--sky-mid').trim() || '#0d2347');
  grad.addColorStop(1, getComputedStyle(document.body).getPropertyValue('--sky-glow').trim() || '#1a3a6e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars
  if (showStars) {
    stars.forEach(s => {
      s.twinkle += s.speed;
      const op = s.o * (0.7 + 0.3 * Math.sin(s.twinkle));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,220,255,${op})`;
      ctx.fill();
    });
  }

  // Clouds
  if (showClouds) {
    clouds.forEach(c => {
      c.x += c.speed * 0.3;
      if (c.x > canvas.width + c.w) c.x = -c.w;
      ctx.beginPath();
      const cg = ctx.createRadialGradient(c.x + c.w/2, c.y, c.h*0.2, c.x + c.w/2, c.y, c.w*0.6);
      cg.addColorStop(0, `rgba(150,170,220,${c.o})`);
      cg.addColorStop(1, 'transparent');
      ctx.fillStyle = cg;
      ctx.ellipse(c.x + c.w/2, c.y, c.w/2, c.h, 0, 0, Math.PI*2);
      ctx.fill();
    });
  }

  requestAnimationFrame(drawSky);
}
drawSky();

// ── WEATHER ICONS ──
const ICONS = {
  clear: '☀️', sunny: '☀️', clouds_few: '🌤️', clouds_scattered: '⛅',
  clouds_broken: '🌥️', clouds_overcast: '☁️', rain_light: '🌦️',
  rain: '🌧️', rain_heavy: '⛈️', thunderstorm: '⛈️', drizzle: '🌦️',
  snow: '❄️', mist: '🌫️', fog: '🌫️', haze: '🌁', smoke: '🌁',
  dust: '💨', sand: '🌪️', tornado: '🌪️', default: '🌡️'
};

function getIcon(weather) {
  if (!weather) return ICONS.default;
  const main = weather.main.toLowerCase();
  const desc = weather.description.toLowerCase();
  if (main === 'clear') return ICONS.clear;
  if (main === 'thunderstorm') return ICONS.thunderstorm;
  if (main === 'drizzle') return ICONS.drizzle;
  if (main === 'rain') return desc.includes('heavy') ? ICONS.rain_heavy : ICONS.rain;
  if (main === 'snow') return ICONS.snow;
  if (main === 'mist' || main === 'fog') return ICONS.mist;
  if (main === 'haze') return ICONS.haze;
  if (main === 'smoke' || main === 'dust') return ICONS.smoke;
  if (main === 'clouds') {
    if (desc.includes('few')) return ICONS.clouds_few;
    if (desc.includes('scattered')) return ICONS.clouds_scattered;
    return ICONS.clouds_broken;
  }
  return ICONS.default;
}

// ── THEME ──
function applyTheme(weather) {
  const main = (weather?.main || '').toLowerCase();
  const themes = {
    clear: 'theme-clear', sunny: 'theme-sunny', clouds: 'theme-clouds',
    rain: 'theme-rain', drizzle: 'theme-rain', thunderstorm: 'theme-storm',
    snow: 'theme-snow', mist: 'theme-mist', fog: 'theme-mist',
    haze: 'theme-mist', smoke: 'theme-mist'
  };
  document.body.className = themes[main] || 'theme-clear';
  showStars = !['clouds','rain','drizzle','thunderstorm','snow','mist','fog','haze','smoke'].includes(main);
  showClouds = ['clouds','mist','fog','haze'].includes(main);
  // Rain effect
  document.getElementById('rain-container').classList.toggle('active', ['rain','drizzle','thunderstorm'].includes(main));
  document.getElementById('snow-container').classList.toggle('active', main === 'snow');
}

// ── RAIN DROPS ──
const rainCont = document.getElementById('rain-container');
for (let i = 0; i < 60; i++) {
  const d = document.createElement('div');
  d.className = 'raindrop';
  const h = Math.random() * 60 + 20;
  d.style.cssText = `left:${Math.random()*100}%;height:${h}px;animation-duration:${Math.random()*0.8+0.5}s;animation-delay:${Math.random()*2}s;opacity:${Math.random()*0.4+0.2}`;
  rainCont.appendChild(d);
}

// ── SNOWFLAKES ──
const snowCont = document.getElementById('snow-container');
const flakes = ['❄','✦','✧','❅'];
for (let i = 0; i < 40; i++) {
  const f = document.createElement('div');
  f.className = 'snowflake';
  f.textContent = flakes[Math.floor(Math.random()*flakes.length)];
  f.style.cssText = `left:${Math.random()*100}%;animation-duration:${Math.random()*5+5}s;animation-delay:${Math.random()*5}s;font-size:${Math.random()*0.8+0.5}rem;opacity:${Math.random()*0.5+0.3}`;
  snowCont.appendChild(f);
}

// ── TOAST ──
function showToast(msg, duration=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ── TIME HELPERS ──
function fmtTime(unix, tz) {
  return new Date((unix + tz) * 1000).toUTCString().match(/\d{2}:\d{2}/)[0];
}
function fmtDay(unix, tz, short=false) {
  const d = new Date((unix + tz) * 1000);
  return short ? ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getUTCDay()]
               : ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getUTCDay()];
}
function uvIndex(uv) {
  if (uv <= 2) return {label:'Low', color:'#34d399'};
  if (uv <= 5) return {label:'Moderate', color:'#fbbf24'};
  if (uv <= 7) return {label:'High', color:'#fb923c'};
  if (uv <= 10) return {label:'Very High', color:'#f87171'};
  return {label:'Extreme', color:'#c084fc'};
}
function compassDir(deg) {
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg/45) % 8];
}

// ── TEMP FORMAT ──
function fmtTemp(k, u) {
  if (u === 'metric') return Math.round(k) + '°C';
  return Math.round(k * 9/5 + 32) + '°F';
}
function rawTemp(k, u) {
  return u === 'metric' ? Math.round(k) : Math.round(k * 9/5 + 32);
}

// ── SUN ARC SVG ──
function buildSunArc(sunrise, sunset, now, tz) {
  const rise = sunrise + tz;
  const set = sunset + tz;
  const cur = now + tz;
  const total = set - rise;
  const elapsed = Math.max(0, Math.min(cur - rise, total));
  const pct = total > 0 ? elapsed / total : 0;

  const W = 400, H = 120, R = 160;
  const cx = W/2, cy = H + 20;
  const startAngle = Math.PI;
  const endAngle = 0;

  const sunAngle = Math.PI - pct * Math.PI;
  const sx = cx + R * Math.cos(sunAngle);
  const sy = cy + R * Math.sin(sunAngle);

  return `<svg class="sun-arc-svg" viewBox="0 0 ${W} ${H}" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M ${cx-R} ${cy} A ${R} ${R} 0 0 1 ${cx+R} ${cy}" stroke="rgba(255,255,255,0.08)" stroke-width="2" stroke-dasharray="4 6"/>
    <path d="M ${cx-R} ${cy} A ${R} ${R} 0 0 1 ${sx} ${sy}" stroke="url(#sungrad)" stroke-width="2.5"/>
    <defs><linearGradient id="sungrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#fb923c"/></linearGradient></defs>
    <circle cx="${cx-R}" cy="${cy}" r="5" fill="rgba(251,191,36,0.4)"/>
    <circle cx="${cx+R}" cy="${cy}" r="5" fill="rgba(251,191,36,0.4)"/>
    ${pct > 0 && pct < 1 ? `<circle cx="${sx}" cy="${sy}" r="8" fill="#fbbf24" filter="drop-shadow(0 0 8px #fbbf24)"/><circle cx="${sx}" cy="${sy}" r="14" fill="rgba(251,191,36,0.15)"/>` : ''}
  </svg>`;
}

// ── MAIN RENDER ──
function renderWeather(data, forecast) {
  const { main: weather } = data.weather[0];
  const { name, sys, wind, main, visibility, clouds, timezone } = data;
  const icon = getIcon(data.weather[0]);
  applyTheme(data.weather[0]);
  weatherData = { data, forecast };

  const now = Math.floor(Date.now()/1000);

  // Build hourly (from forecast, next 12)
  const hourly = forecast.list.slice(0, 12);

  // Build 7-day
  const dailyMap = {};
  forecast.list.forEach(item => {
    const d = new Date((item.dt + timezone) * 1000);
    const key = `${d.getUTCFullYear()}-${d.getUTCMonth()}-${d.getUTCDate()}`;
    if (!dailyMap[key]) dailyMap[key] = { items:[], dt: item.dt };
    dailyMap[key].items.push(item);
  });
  const days = Object.values(dailyMap).slice(0, 7);

  // Humidity gauge color
  const humColor = main.humidity > 80 ? '#60a5fa' : main.humidity > 50 ? '#34d399' : '#fbbf24';

  const html = `
    <!-- HERO CARD -->
    <div class="hero-card">
      <div class="hero-left">
        <div class="hero-location">
          <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${name}, ${sys.country}
        </div>
        <div class="hero-temp-block">
          <div class="hero-temp">${rawTemp(main.temp, unit)}<sup>${unit==='metric'?'°C':'°F'}</sup></div>
          <div class="hero-feels">Feels like ${rawTemp(main.feels_like, unit)}° &nbsp;·&nbsp; ${data.weather[0].description.charAt(0).toUpperCase() + data.weather[0].description.slice(1)}</div>
        </div>
        <div class="hero-bottom">
          <div class="hero-condition">${fmtDay(now, timezone, true)}, ${fmtTime(now, timezone)}</div>
        </div>
      </div>
      <div class="hero-right">
        <div class="weather-icon-wrap">
          <div class="weather-icon-big">${icon}</div>
        </div>
        <div class="hero-stats-mini">
          <div class="mini-stat"><div class="mini-stat-label">High</div><div class="mini-stat-val">${rawTemp(main.temp_max, unit)}°</div></div>
          <div class="mini-stat"><div class="mini-stat-label">Low</div><div class="mini-stat-val">${rawTemp(main.temp_min, unit)}°</div></div>
          <div class="mini-stat"><div class="mini-stat-label">Humidity</div><div class="mini-stat-val">${main.humidity}%</div></div>
          <div class="mini-stat"><div class="mini-stat-label">Pressure</div><div class="mini-stat-val">${main.pressure} hPa</div></div>
        </div>
      </div>
    </div>

    <!-- INFO ROW -->
    <div class="info-row">
      <div class="info-card">
        <span class="info-icon">💨</span>
        <div class="info-label">Wind</div>
        <div class="info-val">${(unit==='metric'?wind.speed:(wind.speed*2.237)).toFixed(1)} ${unit==='metric'?'m/s':'mph'}</div>
        <div class="info-sub">${compassDir(wind.deg)} · ${wind.gust ? `Gust ${(unit==='metric'?wind.gust:(wind.gust*2.237)).toFixed(1)} ${unit==='metric'?'m/s':'mph'}` : 'No gusts'}</div>
      </div>
      <div class="info-card">
        <span class="info-icon">💧</span>
        <div class="info-label">Humidity</div>
        <div class="info-val">${main.humidity}%</div>
        <div class="gauge-wrap"><div class="gauge-bar"><div class="gauge-fill" data-w="${main.humidity}" style="background:${humColor}"></div></div></div>
        <div class="info-sub">${main.humidity>70?'Feels muggy':'Comfortable'}</div>
      </div>
      <div class="info-card">
        <span class="info-icon">👁️</span>
        <div class="info-label">Visibility</div>
        <div class="info-val">${visibility ? (visibility/1000).toFixed(1)+' km' : 'N/A'}</div>
        <div class="info-sub">${visibility>=10000?'Crystal clear':visibility>=5000?'Good':'Reduced'}</div>
      </div>
      <div class="info-card">
        <span class="info-icon">☁️</span>
        <div class="info-label">Cloud Cover</div>
        <div class="info-val">${clouds.all}%</div>
        <div class="gauge-wrap"><div class="gauge-bar"><div class="gauge-fill" data-w="${clouds.all}" style="background:rgba(148,163,184,0.8)"></div></div></div>
        <div class="info-sub">${clouds.all<20?'Clear sky':clouds.all<50?'Partly cloudy':'Overcast'}</div>
      </div>
    </div>

    <!-- HOURLY -->
    <div>
      <div class="section-header">
        <span class="section-label">Next 36 Hours</span>
        <span style="font-family:var(--font-mono);font-size:0.68rem;color:var(--muted)">Scroll →</span>
      </div>
      <div class="hourly-scroll">
        ${hourly.map((h,i) => {
          const hIcon = getIcon(h.weather[0]);
          const hTime = fmtTime(h.dt, timezone);
          const rain = h.pop ? Math.round(h.pop*100) : 0;
          return `<div class="hour-card ${i===0?'now':''}">
            <div class="hour-time">${i===0?'Now':hTime}</div>
            <span class="hour-icon">${hIcon}</span>
            <div class="hour-temp">${rawTemp(h.main.temp, unit)}°</div>
            ${rain>10?`<div class="hour-rain">💧${rain}%</div>`:'<div class="hour-rain" style="opacity:0">-</div>'}
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- 7-DAY FORECAST -->
    <div>
      <div class="section-header"><span class="section-label">7-Day Forecast</span></div>
      <div class="forecast-grid">
        ${days.map((day,i) => {
          const temps = day.items.map(x=>x.main.temp);
          const hi = Math.max(...temps), lo = Math.min(...temps);
          const dIcon = getIcon(day.items[Math.floor(day.items.length/2)].weather[0]);
          const rain = Math.max(...day.items.map(x=>x.pop||0));
          return `<div class="day-card ${i===0?'today':''}">
            <div class="day-name">${i===0?'Today':fmtDay(day.dt, timezone, true)}</div>
            <span class="day-icon">${dIcon}</span>
            <div class="day-temps">
              <span class="day-hi">${rawTemp(hi,unit)}°</span>
              <span class="day-lo">${rawTemp(lo,unit)}°</span>
            </div>
            ${rain>0.1?`<div class="day-rain">💧${Math.round(rain*100)}%</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- BOTTOM GRID -->
    <div class="bottom-grid">
      <!-- SUN ARC -->
      <div class="sun-card">
        <div class="section-label" style="margin-bottom:16px">Sunrise / Sunset</div>
        <div class="sun-arc-wrap">${buildSunArc(sys.sunrise, sys.sunset, now, timezone)}</div>
        <div class="sun-times">
          <div><div class="sun-time-label">Sunrise</div><div class="sun-time-val">🌅 ${fmtTime(sys.sunrise, timezone)}</div></div>
          <div style="text-align:center"><div class="sun-time-label">Daylight</div><div class="sun-time-val">${Math.round((sys.sunset-sys.sunrise)/3600)}h ${Math.round(((sys.sunset-sys.sunrise)%3600)/60)}m</div></div>
          <div style="text-align:right"><div class="sun-time-label">Sunset</div><div class="sun-time-val">🌇 ${fmtTime(sys.sunset, timezone)}</div></div>
        </div>
      </div>

      <!-- WIND COMPASS -->
      <div class="aqi-card">
        <div class="section-label" style="margin-bottom:16px">Wind Details</div>
        <div style="display:flex;align-items:center;gap:20px;margin-bottom:16px">
          <div style="position:relative;width:80px;height:80px;flex-shrink:0">
            <svg width="80" height="80" viewBox="0 0 80 80">
              <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>
              <circle cx="40" cy="40" r="4" fill="var(--accent)"/>
              <!-- Compass marks -->
              <text x="40" y="12" text-anchor="middle" fill="rgba(200,215,255,0.5)" font-size="8" font-family="monospace">N</text>
              <text x="72" y="44" text-anchor="middle" fill="rgba(200,215,255,0.3)" font-size="7" font-family="monospace">E</text>
              <text x="40" y="76" text-anchor="middle" fill="rgba(200,215,255,0.3)" font-size="7" font-family="monospace">S</text>
              <text x="8" y="44" text-anchor="middle" fill="rgba(200,215,255,0.3)" font-size="7" font-family="monospace">W</text>
              <!-- Arrow -->
              <line x1="40" y1="40"
                x2="${40 + 28*Math.sin(wind.deg*Math.PI/180)}"
                y2="${40 - 28*Math.cos(wind.deg*Math.PI/180)}"
                stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div>
            <div style="font-family:var(--font-display);font-size:1.1rem;font-style:italic">${compassDir(wind.deg)} Wind</div>
            <div style="font-family:var(--font-mono);font-size:1.4rem;margin-top:4px;color:var(--text)">${(unit==='metric'?wind.speed:(wind.speed*2.237)).toFixed(1)} <span style="font-size:0.8rem;color:var(--muted)">${unit==='metric'?'m/s':'mph'}</span></div>
          </div>
        </div>
        <div class="aqi-bars">
          <div class="aqi-bar-item"><div class="aqi-bar-label"><span>Speed</span><span>${(unit==='metric'?wind.speed:(wind.speed*2.237)).toFixed(1)}</span></div><div class="aqi-bar-bg"><div class="aqi-bar-fill" data-w="${Math.min(wind.speed*3,100)}" style="background:var(--accent)"></div></div></div>
          <div class="aqi-bar-item"><div class="aqi-bar-label"><span>Gust</span><span>${wind.gust?(unit==='metric'?wind.gust:(wind.gust*2.237)).toFixed(1):'0'}</span></div><div class="aqi-bar-bg"><div class="aqi-bar-fill" data-w="${Math.min((wind.gust||0)*3,100)}" style="background:var(--accent2)"></div></div></div>
        </div>
      </div>

      <!-- MAP PLACEHOLDER -->
      <div class="map-card">
        <div class="map-grid"></div>
        <div class="map-pin">📍</div>
        <div class="map-coords">${data.coord.lat.toFixed(4)}°N, ${data.coord.lon.toFixed(4)}°E</div>
      </div>
    </div>
  `;

  document.getElementById('main').innerHTML = html;

  // Animate gauges
  setTimeout(() => {
    document.querySelectorAll('.gauge-fill[data-w], .aqi-bar-fill[data-w]').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  }, 200);
}

// ── API FETCH ──
async function fetchWeather(query, isCoords=false) {
  showLoading();
  try {
    const loc = isCoords ? `lat=${query.lat}&lon=${query.lon}` : `q=${encodeURIComponent(query)}`;

    const [cur, fc] = await Promise.all([
      fetch(`${BASE}/weather?${loc}&appid=${API_KEY}&units=kelvin`).then(r=>r.json()),
      fetch(`${BASE}/forecast?${loc}&appid=${API_KEY}&units=kelvin`).then(r=>r.json())
    ]);

    if (cur.cod !== 200 && cur.cod !== undefined && cur.cod != '200') {
      throw new Error(cur.message || 'City not found');
    }

    currentCity = cur.name;

    // Convert kelvin to the right unit inline
    const convertTemp = (k) => unit === 'metric' ? k - 273.15 : (k - 273.15) * 9/5 + 32;

    renderWeather(cur, fc);
    showToast(`📍 ${cur.name}, ${cur.sys.country} — Updated just now`);
  } catch (err) {
    showError(err.message);
  }
}

// For demo mode — use Open-Meteo (no API key needed) + geocoding
async function loadDemo(cityName) {
  showLoading();
  try {
    // 1. Geocode city
    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=1&language=en&format=json`);
    const geoData = await geoRes.json();
    if (!geoData.results?.length) throw new Error('City not found');
    const { latitude: lat, longitude: lon, name, country_code, timezone, timezone_abbreviation } = geoData.results[0];

    // 2. Fetch weather
    const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,surface_pressure,visibility,cloud_cover&hourly=temperature_2m,weather_code,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_probability_max&wind_speed_unit=ms&timezone=auto&forecast_days=7`);
    const wData = await wRes.json();

    renderOpenMeteo(wData, name, country_code, lat, lon, timezone, timezone_abbreviation);
    showToast(`📍 ${name}, ${country_code} — Live data`);
    currentCity = name;
  } catch(err) {
    showError(err.message);
  }
}

// WMO code to OWM-style weather
function wmoToWeather(code) {
  if (code === 0) return {main:'Clear', description:'clear sky'};
  if (code <= 3) return {main:'Clouds', description:code===1?'few clouds':code===2?'scattered clouds':'overcast clouds'};
  if (code <= 49) return {main:'Mist', description:'foggy'};
  if (code <= 55) return {main:'Drizzle', description:'drizzle'};
  if (code <= 67) return {main:'Rain', description:code>=65?'heavy rain':'moderate rain'};
  if (code <= 77) return {main:'Snow', description:'snow'};
  if (code <= 82) return {main:'Rain', description:'rain showers'};
  if (code <= 86) return {main:'Snow', description:'snow showers'};
  return {main:'Thunderstorm', description:'thunderstorm'};
}

function renderOpenMeteo(w, city, country, lat, lon, tz, tzAbbr) {
  const c = w.current;
  const d = w.daily;
  const h = w.hourly;
  const now = new Date();

  // Find current hour index
  const nowIso = now.toISOString().slice(0,13);
  const curHourIdx = h.time.findIndex(t => t.startsWith(nowIso));

  const weather = wmoToWeather(c.weather_code);
  applyTheme(weather);

  // Temp conversion
  const temp = unit === 'metric' ? c.temperature_2m : c.temperature_2m * 9/5 + 32;
  const feelsLike = unit === 'metric' ? c.apparent_temperature : c.apparent_temperature * 9/5 + 32;
  const convT = t => unit === 'metric' ? Math.round(t) : Math.round(t * 9/5 + 32);

  const icon = getIcon(weather);

  // Sunrise/sunset as unix
  const sunriseUnix = d.sunrise[0] ? Math.floor(new Date(d.sunrise[0]).getTime()/1000) : 0;
  const sunsetUnix = d.sunset[0] ? Math.floor(new Date(d.sunset[0]).getTime()/1000) : 0;
  const nowUnix = Math.floor(now.getTime()/1000);
  const tzOffset = 0; // open-meteo times are already local

  // Build hourly list (next 12 hours)
  const hourlyItems = [];
  const startIdx = curHourIdx >= 0 ? curHourIdx : 0;
  for (let i = startIdx; i < Math.min(startIdx+12, h.time.length); i++) {
    const t = unit==='metric' ? h.temperature_2m[i] : h.temperature_2m[i]*9/5+32;
    hourlyItems.push({
      time: i === startIdx ? 'Now' : h.time[i].slice(11,16),
      icon: getIcon(wmoToWeather(h.weather_code[i])),
      temp: Math.round(t),
      rain: h.precipitation_probability[i] || 0,
      isNow: i === startIdx

  }

  const sunriseStr = d.sunrise[0] ? d.sunrise[0].slice(11,16) : '--:--';
  const sunsetStr = d.sunset[0] ? d.sunset[0].slice(11,16) : '--:--';

  // Days of week
  const dayNames = d.time.map((t,i) => {
    const dt = new Date(t);
    return i===0?'Today':['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dt.getDay()];
  });

  const windKmh = c.wind_speed_10m * 3.6;
  const windMph = c.wind_speed_10m * 2.237;
  const windDisplay = unit==='metric' ? `${c.wind_speed_10m.toFixed(1)} m/s` : `${windMph.toFixed(1)} mph`;

  const html = `
    <div class="hero-card">
      <div class="hero-left">
        <div class="hero-location">
          <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${city}, ${country}
        </div>
        <div class="hero-temp-block">
          <div class="hero-temp">${Math.round(temp)}<sup>${unit==='metric'?'°C':'°F'}</sup></div>
          <div class="hero-feels">Feels like ${Math.round(feelsLike)}° &nbsp;·&nbsp; ${weather.description.charAt(0).toUpperCase()+weather.description.slice(1)}</div>
        </div>
        <div class="hero-bottom">
          <div class="hero-condition">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][now.getDay()]}, ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} ${tzAbbr}</div>
        </div>
      </div>
      <div class="hero-right">
        <div class="weather-icon-wrap"><div class="weather-icon-big">${icon}</div></div>
        <div class="hero-stats-mini">
          <div class="mini-stat"><div class="mini-stat-label">High</div><div class="mini-stat-val">${convT(d.temperature_2m_max[0])}°</div></div>
          <div class="mini-stat"><div class="mini-stat-label">Low</div><div class="mini-stat-val">${convT(d.temperature_2m_min[0])}°</div></div>
          <div class="mini-stat"><div class="mini-stat-label">Humidity</div><div class="mini-stat-val">${c.relative_humidity_2m}%</div></div>
          <div class="mini-stat"><div class="mini-stat-label">Pressure</div><div class="mini-stat-val">${Math.round(c.surface_pressure)} hPa</div></div>
        </div>
      </div>
    </div>

    <div class="info-row">
      <div class="info-card"><span class="info-icon">💨</span><div class="info-label">Wind</div><div class="info-val">${windDisplay}</div><div class="info-sub">${compassDir(c.wind_direction_10m)} direction</div></div>
      <div class="info-card"><span class="info-icon">💧</span><div class="info-label">Humidity</div><div class="info-val">${c.relative_humidity_2m}%</div><div class="gauge-wrap"><div class="gauge-bar"><div class="gauge-fill" data-w="${c.relative_humidity_2m}"></div></div></div><div class="info-sub">${c.relative_humidity_2m>70?'Feels muggy':'Comfortable'}</div></div>
      <div class="info-card"><span class="info-icon">👁️</span><div class="info-label">Visibility</div><div class="info-val">${c.visibility?(c.visibility/1000).toFixed(1)+' km':'N/A'}</div><div class="info-sub">${!c.visibility||c.visibility>=10000?'Clear':'Reduced'}</div></div>
      <div class="info-card"><span class="info-icon">☁️</span><div class="info-label">Cloud Cover</div><div class="info-val">${c.cloud_cover}%</div><div class="gauge-wrap"><div class="gauge-bar"><div class="gauge-fill" data-w="${c.cloud_cover}" style="background:rgba(148,163,184,0.8)"></div></div></div><div class="info-sub">${c.cloud_cover<20?'Clear':c.cloud_cover<60?'Partly cloudy':'Overcast'}</div></div>
    </div>

    <div>
      <div class="section-header"><span class="section-label">Next 12 Hours</span><span style="font-family:var(--font-mono);font-size:0.68rem;color:var(--muted)">Scroll →</span></div>
      <div class="hourly-scroll">
        ${hourlyItems.map(h => `<div class="hour-card ${h.isNow?'now':''}">
          <div class="hour-time">${h.time}</div>
          <span class="hour-icon">${h.icon}</span>
          <div class="hour-temp">${h.temp}°</div>
          ${h.rain>10?`<div class="hour-rain">💧${h.rain}%</div>`:'<div class="hour-rain" style="opacity:0">-</div>'}
        </div>`).join('')}
      </div>
    </div>

    <div>
      <div class="section-header"><span class="section-label">7-Day Forecast</span></div>
      <div class="forecast-grid">
        ${d.time.map((_,i) => `<div class="day-card ${i===0?'today':''}">
          <div class="day-name">${dayNames[i]}</div>
          <span class="day-icon">${getIcon(wmoToWeather(d.weather_code[i]))}</span>
          <div class="day-temps"><span class="day-hi">${convT(d.temperature_2m_max[i])}°</span><span class="day-lo">${convT(d.temperature_2m_min[i])}°</span></div>
          ${d.precipitation_probability_max[i]>10?`<div class="day-rain">💧${d.precipitation_probability_max[i]}%</div>`:''}

    </div>

    <div class="bottom-grid">

          <div style="text-align:center"><div class="sun-time-label">Daylight</div><div class="sun-time-val">${sunriseUnix&&sunsetUnix?Math.round((sunsetUnix-sunriseUnix)/3600)+'h':'—'}</div></div>
          <div style="text-align:right"><div class="sun-time-label">Sunset</div><div class="sun-time-val">🌇 ${sunsetStr}</div></div>
        </div>
      </div>

      <div class="aqi-card">
        <div class="section-label" style="margin-bottom:16px">Wind Details</div>
        <div style="display:flex;align-items:center;gap:20px;margin-bottom:16px">
          <div style="position:relative;width:80px;height:80px;flex-shrink:0">
            <svg width="80" height="80" viewBox="0 0 80 80">
              <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>
              <circle cx="40" cy="40" r="4" fill="var(--accent)"/>
              <text x="40" y="12" text-anchor="middle" fill="rgba(200,215,255,0.5)" font-size="8" font-family="monospace">N</text>
              <text x="72" y="44" text-anchor="middle" fill="rgba(200,215,255,0.3)" font-size="7" font-family="monospace">E</text>
              <text x="40" y="76" text-anchor="middle" fill="rgba(200,215,255,0.3)" font-size="7" font-family="monospace">S</text>
              <text x="8" y="44" text-anchor="middle" fill="rgba(200,215,255,0.3)" font-size="7" font-family="monospace">W</text>
              <line x1="40" y1="40" x2="${40 + 28*Math.sin(c.wind_direction_10m*Math.PI/180)}" y2="${40 - 28*Math.cos(c.wind_direction_10m*Math.PI/180)}" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div>
            <div style="font-family:var(--font-display);font-size:1.1rem;font-style:italic">${compassDir(c.wind_direction_10m)} Wind</div>
            <div style="font-family:var(--font-mono);font-size:1.4rem;margin-top:4px">${windDisplay}</div>
          </div>
        </div>
        <div class="aqi-bars">
          <div class="aqi-bar-item"><div class="aqi-bar-label"><span>Speed</span><span>${c.wind_speed_10m.toFixed(1)}</span></div><div class="aqi-bar-bg"><div class="aqi-bar-fill" data-w="${Math.min(c.wind_speed_10m*4,100)}" style="background:var(--accent)"></div></div></div>
        </div>
      </div>

      <div class="map-card">
        <div class="map-grid"></div>
        <div class="map-pin">📍</div>
        <div class="map-coords">${lat.toFixed(4)}°, ${lon.toFixed(4)}°</div>
      </div>
    </div>
  `;

  document.getElementById('main').innerHTML = html;
  setTimeout(() => {
    document.querySelectorAll('.gauge-fill[data-w], .aqi-bar-fill[data-w]').forEach(el => { el.style.width = el.dataset.w + '%'; });
  }, 200);
}

function showLoading() {
  document.getElementById('main').innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-label">Reading the sky…</div>
    </div>`;
}

function showError(msg) {
  document.getElementById('main').innerHTML = `
    <div class="error-state">
      <div class="error-icon">⛅</div>
      <div class="error-title">Can't read the sky</div>
      <div class="error-desc">${msg || 'Something went wrong. Check your city name or try again.'}</div>
      <button class="retry-btn" onclick="document.getElementById('welcome-state') && loadDemo('Delhi')">Try a demo city →</button>
    </div>`;
}

// ── GEOLOCATION ──
function getLocation() {
  if (!navigator.geolocation) { showToast('❌ Geolocation not supported'); return; }
  showLoading();
  navigator.geolocation.getCurrentPosition(
    pos => {
      if (API_KEY === 'YOUR_API_KEY_HERE') {
        // Use open-meteo for coords too
        loadDemoCoords(pos.coords.latitude, pos.coords.longitude);
      } else {
        fetchWeather({ lat: pos.coords.latitude, lon: pos.coords.longitude }, true);
      }
    },
    err => { showError('Location access denied. Try searching a city instead.'); }
  );
}

async function loadDemoCoords(lat, lon) {
  try {
    const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
    const geo = await geoRes.json();
    const city = geo.address.city || geo.address.town || geo.address.village || 'Your Location';
    const country = geo.address.country_code?.toUpperCase() || '';
    const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,surface_pressure,visibility,cloud_cover&hourly=temperature_2m,weather_code,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_probability_max&wind_speed_unit=ms&timezone=auto&forecast_days=7`);
    const wData = await wRes.json();
    renderOpenMeteo(wData, city, country, lat, lon, wData.timezone, wData.timezone_abbreviation);
    showToast(`📍 ${city} — Your location`);
  } catch(e) { showError(e.message); }
}

// ── SEARCH ──
function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  if (API_KEY === 'YOUR_API_KEY_HERE') {
    loadDemo(q);
  } else {
    fetchWeather(q);
  }
}

document.getElementById('search-btn').addEventListener('click', doSearch);
document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
document.getElementById('geo-btn').addEventListener('click', getLocation);

// ── UNIT TOGGLE ──
document.getElementById('btn-c').addEventListener('click', () => {
  unit = 'metric';
  document.getElementById('btn-c').classList.add('active');
  document.getElementById('btn-f').classList.remove('active');
  if (currentCity) loadDemo(currentCity);
});
document.getElementById('btn-f').addEventListener('click', () => {
  unit = 'imperial';
  document.getElementById('btn-f').classList.add('active');
  document.getElementById('btn-c').classList.remove('active');
  if (currentCity) loadDemo(currentCity);
});

// ── AUTO LOAD ──
loadDemo('Delhi');
</script>
